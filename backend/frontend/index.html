<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 판단기</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: #f2f4f6; color: #191f28; min-height: 100vh; }

/* ═══════════════════════════════════
   공통
═══════════════════════════════════ */
.up   { color: #f04452; }
.down { color: #3182f6; }
.flat { color: #8b95a1; }

.badge { font-size: 0.72rem; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
.badge-buy     { background: #fff0f1; color: #f04452; }
.badge-sell    { background: #f0f4ff; color: #3182f6; }
.badge-neutral { background: #f2f4f6; color: #8b95a1; }

/* ═══════════════════════════════════
   PC 레이아웃  (≥ 768px)
═══════════════════════════════════ */
@media (min-width: 768px) {
  body { display: flex; height: 100vh; overflow: hidden; background: #f2f4f6; }

  /* 사이드바 */
  .sidebar {
    width: 260px; min-width: 260px; background: #fff;
    border-right: 1px solid #e5e8eb; display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
  }
  .sidebar-header { padding: 20px 20px 12px; border-bottom: 1px solid #f2f4f6; }
  .sidebar-title { font-size: 1rem; font-weight: 800; margin-bottom: 12px; }
  .sidebar-search { display: flex; align-items: center; gap: 8px;
                    background: #f2f4f6; border-radius: 10px; padding: 8px 12px; }
  .sidebar-search input { border: none; background: transparent; flex: 1;
                          font-size: 0.9rem; outline: none; color: #191f28; }
  .sidebar-search input::placeholder { color: #8b95a1; }

  .stock-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .stock-list-item { display: flex; justify-content: space-between; align-items: center;
                     padding: 12px 20px; cursor: pointer; transition: background 0.1s; }
  .stock-list-item:hover { background: #f8f9fa; }
  .stock-list-item.active { background: #f0f6ff; }
  .sli-left { display: flex; flex-direction: column; gap: 3px; }
  .sli-ticker { font-size: 0.95rem; font-weight: 600; }
  .sli-name   { font-size: 0.78rem; color: #8b95a1; }
  .sli-delete { background: none; border: none; color: #c4c9d1; cursor: pointer;
                font-size: 0.85rem; padding: 4px; border-radius: 4px; }
  .sli-delete:hover { color: #f04452; background: #fff0f1; }

  .sidebar-add { padding: 12px 20px; border-top: 1px solid #f2f4f6; }
  .sidebar-add-btn { width: 100%; padding: 10px; border-radius: 10px;
                     background: #f2f4f6; border: none; cursor: pointer;
                     font-size: 0.9rem; color: #3182f6; font-weight: 600; }
  .sidebar-add-btn:hover { background: #e8f0fe; }

  .sidebar-suggestions { background: #fff; border: 1px solid #e5e8eb; border-radius: 10px;
                         margin: 0 12px 8px; overflow: hidden; max-height: 300px; overflow-y: auto; }
  .sug-item { padding: 10px 14px; cursor: pointer; display: flex;
              justify-content: space-between; font-size: 0.88rem; border-bottom: 1px solid #f2f4f6; }
  .sug-item:last-child { border-bottom: none; }
  .sug-item:hover { background: #f8f9fa; }
  .sug-ticker { color: #8b95a1; font-size: 0.82rem; }

  /* 모바일 전용 숨김 */
  .mobile-header, .mobile-search-overlay, .mobile-tab-bar,
  .mobile-content, .m-sidebar { display: none !important; }

  /* 메인 컨텐츠 영역 */
  .main { flex: 1; overflow-y: auto; padding: 24px; min-width: 0; }

  .pc-empty { display: flex; flex-direction: column; align-items: center;
              justify-content: center; height: 100%; color: #8b95a1; }
  .pc-empty-icon { font-size: 3rem; margin-bottom: 12px; }

  /* PC 컨텐츠 그리드 */
  .pc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .pc-grid .full-width { grid-column: 1 / -1; }

  .card { background: #fff; border-radius: 16px; padding: 20px; }

  /* 가격 카드 */
  .price-card { background: #fff; border-radius: 16px; padding: 24px; }
  .price-card .stock-label { font-size: 0.85rem; color: #8b95a1; margin-bottom: 8px; }
  .price-card .price-big { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
  .price-card .price-chg { font-size: 0.9rem; margin-top: 6px; }

  /* 판정 카드 */
  .verdict-card { background: #fff; border-radius: 16px; padding: 24px;
                  display: flex; flex-direction: column; justify-content: center; }
  .card-label { font-size: 0.78rem; color: #8b95a1; font-weight: 500; margin-bottom: 12px; }
  .verdict-badge { display: inline-flex; align-items: center; gap: 8px;
                   padding: 12px 20px; border-radius: 12px; font-size: 1.2rem; font-weight: 700; }
  .verdict-buy  { background: #fff0f1; color: #f04452; }
  .verdict-hold { background: #fffbf0; color: #f5a623; }
  .verdict-sell { background: #f0f4ff; color: #3182f6; }

  /* 점수 카드 */
  .score-card { background: #fff; border-radius: 16px; padding: 20px; }
  .score-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .score-num { font-size: 1.8rem; font-weight: 800; }
  .progress-wrap { background: #f2f4f6; border-radius: 6px; height: 6px; margin-bottom: 12px; }
  .progress-fill { height: 6px; border-radius: 6px; background: #3182f6; transition: width 0.5s; }
  .score-sub { display: flex; justify-content: space-between; font-size: 0.82rem; color: #8b95a1; }

  /* 지표 카드 */
  .ind-card { background: #fff; border-radius: 16px; padding: 20px; }
  .ind-card-title { font-size: 0.78rem; color: #8b95a1; font-weight: 500; margin-bottom: 14px; }
  .ind-row { display: flex; justify-content: space-between; align-items: center;
             padding: 10px 0; border-bottom: 1px solid #f2f4f6; }
  .ind-row:last-child { border-bottom: none; }
  .ind-left { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; }
  .ind-val  { font-size: 0.88rem; font-weight: 500; }
}

/* ═══════════════════════════════════
   모바일 레이아웃  (< 768px)
═══════════════════════════════════ */
@media (max-width: 767px) {
  .sidebar, .main, .pc-grid, .pc-empty { display: none !important; }
  .mobile-header, .mobile-tab-bar { display: none !important; }

  /* 모바일 레이아웃: 왼쪽 사이드바 + 오른쪽 컨텐츠 */
  body { display: flex; height: 100dvh; overflow: hidden; }

  /* 왼쪽 종목 사이드바 */
  .m-sidebar { display: flex; flex-direction: column; width: 88px; min-width: 88px;
               height: 100dvh; background: #fff; border-right: 1px solid #f2f4f6;
               overflow-y: auto; overflow-x: hidden; scrollbar-width: none; position: relative; }
  .m-sidebar::-webkit-scrollbar { display: none; }
  .m-sidebar-logo { padding: 12px 0 8px; text-align: center; font-size: 1.2rem; }
  .m-sidebar-item { display: flex; flex-direction: column; align-items: center;
                    padding: 10px 4px; cursor: pointer; border-left: 3px solid transparent;
                    position: relative; }
  .m-sidebar-item.active { background: #f0f4ff; border-left-color: #3182f6; }
  .m-sidebar-item:active { background: #f2f4f6; }
  .m-sidebar-name { font-size: 0.65rem; font-weight: 600; color: #444; text-align: center;
                    line-height: 1.3; word-break: keep-all; max-width: 80px;
                    overflow-wrap: break-word; }
  .m-sidebar-item.active .m-sidebar-name { color: #3182f6; }
  .m-sidebar-del { display: none; position: absolute; top: 2px; right: 2px;
                   font-size: 0.55rem; color: #c4c9d1; background: none; border: none;
                   cursor: pointer; padding: 2px; line-height: 1; }
  .m-sidebar-item:hover .m-sidebar-del { display: block; }
  .m-sidebar-add { padding: 10px 0; text-align: center; }
  .m-sidebar-add button { background: none; border: none; cursor: pointer;
                          font-size: 1.1rem; color: #8b95a1; }

  /* 오른쪽 컨텐츠 */
  .mobile-content { display: block; flex: 1; overflow-y: auto; background: #f8f9fa; padding-bottom: 40px; min-width: 0; }

  /* 검색 오버레이 */
  .mobile-search-overlay { display: none; position: fixed; inset: 0;
                           background: #fff; z-index: 200; flex-direction: column; }
  .mobile-search-overlay.visible { display: flex; }
  .mso-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px;
                border-bottom: 1px solid #f2f4f6; }
  .mso-header input { flex: 1; border: none; font-size: 1rem; outline: none; }
  .mso-header input::placeholder { color: #8b95a1; }
  .mso-cancel { color: #3182f6; font-size: 0.9rem; cursor: pointer; }
  .mso-list { flex: 1; overflow-y: auto; }
  .mso-item { display: flex; justify-content: space-between; align-items: center;
              padding: 15px 20px; border-bottom: 1px solid #f2f4f6; cursor: pointer; }
  .mso-item:active { background: #f8f9fa; }
  .mso-name { font-size: 0.93rem; font-weight: 500; }
  .mso-ticker { font-size: 0.82rem; color: #8b95a1; }

  .m-section { background: #fff; margin-bottom: 8px; padding: 16px; }
  .m-label { font-size: 0.75rem; color: #8b95a1; font-weight: 500; margin-bottom: 10px; }

  .m-price-main { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; }
  .m-price-chg  { font-size: 0.88rem; margin-top: 4px; }

  .verdict-badge { display: inline-flex; align-items: center; gap: 8px;
                   padding: 10px 18px; border-radius: 12px; font-size: 1.05rem; font-weight: 700; }
  .verdict-buy  { background: #fff0f1; color: #f04452; }
  .verdict-hold { background: #fffbf0; color: #f5a623; }
  .verdict-sell { background: #f0f4ff; color: #3182f6; }

  .progress-wrap { background: #f2f4f6; border-radius: 6px; height: 6px; margin: 10px 0 12px; }
  .progress-fill { height: 6px; border-radius: 6px; background: #3182f6; transition: width 0.5s; }
  .score-sub { display: flex; justify-content: space-between; font-size: 0.82rem; color: #8b95a1; }

  .ind-row { display: flex; justify-content: space-between; align-items: center;
             padding: 12px 0; border-bottom: 1px solid #f2f4f6; }
  .ind-row:last-child { border-bottom: none; }
  .ind-left { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
  .ind-val  { font-size: 0.9rem; font-weight: 500; }
}

.state-box { background: #fff; padding: 48px 20px; text-align: center;
             color: #8b95a1; font-size: 0.9rem; border-radius: 16px; }
</style>
</head>
<body>

<!-- ══════════════ PC: 사이드바 ══════════════ -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">📈 주식 판단기</div>
    <div class="sidebar-search">
      <span style="color:#8b95a1">🔍</span>
      <input id="pcSearchInput" placeholder="종목명 또는 티커" autocomplete="off" />
    </div>
  </div>
  <div class="sidebar-suggestions" id="pcSuggestions" style="display:none"></div>
  <div class="stock-list" id="pcStockList"></div>
  <div class="sidebar-add">
    <button class="sidebar-add-btn" onclick="document.getElementById('pcSearchInput').focus()">
      + 종목 추가
    </button>
  </div>
</div>

<!-- ══════════════ PC: 메인 ══════════════ -->
<div class="main" id="pcMain">
  <div class="pc-empty" id="pcEmpty">
    <div class="pc-empty-icon">🔍</div>
    <div>왼쪽에서 종목을 검색해 추가하세요</div>
  </div>
  <div id="pcContent" style="display:none"></div>
</div>

<!-- ══════════════ 모바일: 사이드바 ══════════════ -->
<div class="m-sidebar" id="mobileSidebar">
  <div class="m-sidebar-logo">📈</div>
  <div id="mobileSidebarList"></div>
  <div class="m-sidebar-add">
    <button onclick="openMobileSearch()" title="종목 추가">＋</button>
  </div>
</div>

<!-- 모바일 검색 오버레이 -->
<div class="mobile-search-overlay" id="mobileSearchOverlay">
  <div class="mso-header">
    <input id="mobileSearchInput" placeholder="종목명 또는 티커 검색" autocomplete="off" />
    <span class="mso-cancel" onclick="closeMobileSearch()">취소</span>
  </div>
  <div class="mso-list" id="msoList"></div>
</div>

<!-- 모바일 컨텐츠 -->
<div class="mobile-content" id="mobileContent">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
              height:60vh;color:#8b95a1;">
    <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
    <div style="font-size:0.93rem">＋ 버튼으로 종목을 추가해보세요</div>
  </div>
</div>

<script>
const API = "";  // 같은 서버에서 서빙되므로 상대 경로
let ws = null;
let stocks = [];
let selected = null;
let searchTimer = null;
const isMobile = () => window.innerWidth < 768;

/* ── 종목 리스트 서버 동기화 ── */
// stocks = [{ticker, name}, ...]
async function loadWatchlist() {
  try {
    const r = await fetch(`${API}/watchlist`);
    stocks = await r.json();
  } catch { stocks = []; }
  renderAll();
  if (stocks.length > 0) selectStock(stocks[0].ticker);
}

async function serverAdd(ticker) {
  const r = await fetch(`${API}/watchlist/${ticker}`, { method: "POST" });
  stocks = await r.json();
}

async function serverDelete(ticker) {
  const r = await fetch(`${API}/watchlist/${ticker}`, { method: "DELETE" });
  stocks = await r.json();
}

/* ── 렌더링 ── */
function renderAll() {
  renderPcSidebar();
  renderMobileSidebar();
  setTimeout(initSortable, 0);
}

function renderPcSidebar() {
  const el = document.getElementById("pcStockList");
  if (!el) return;
  el.innerHTML = stocks.map(s => `
    <div class="stock-list-item ${s.ticker===selected?'active':''}" onclick="selectStock('${s.ticker}')">
      <div class="sli-left">
        <span class="sli-ticker">${s.name !== s.ticker ? s.name : s.ticker}</span>
        ${s.name !== s.ticker ? `<span class="sli-name">${s.ticker}</span>` : ''}
      </div>
      <button class="sli-delete" onclick="deleteStock(event,'${s.ticker}')">✕</button>
    </div>`).join("");
}

function renderMobileSidebar() {
  const el = document.getElementById("mobileSidebarList");
  if (!el) return;
  el.innerHTML = stocks.map(s => {
    const label = s.name !== s.ticker ? s.name : s.ticker;
    // 공백 기준으로 최대 2줄로 나눔 (예: "KODEX 200" → "KODEX\n200")
    const parts = label.split(" ");
    const line1 = parts[0];
    const line2 = parts.slice(1).join(" ");
    const display = line2 ? `${line1}<br>${line2}` : line1;
    return `
    <div class="m-sidebar-item ${s.ticker===selected?'active':''}" onclick="selectStock('${s.ticker}')">
      <button class="m-sidebar-del" onclick="deleteStock(event,'${s.ticker}')">✕</button>
      <span class="m-sidebar-name">${display}</span>
    </div>`;
  }).join("");
}

/* ── 검색 ── */
let searchDebounce = null;

function setupSearch(inputId, suggestionsId, onSelect) {
  const input = document.getElementById(inputId);
  const sug   = document.getElementById(suggestionsId);
  if (!input) return;

  input.addEventListener("input", async () => {
    clearTimeout(searchDebounce);
    const q = input.value.trim();
    if (!q) { sug.style.display = "none"; return; }
    searchDebounce = setTimeout(async () => {
      try {
        const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
        const items = await r.json();
        if (!items.length) { sug.style.display = "none"; return; }
        sug.style.display = "block";
        sug.innerHTML = items.map(s =>
          `<div class="${suggestionsId==='pcSuggestions'?'sug-item':'mso-item'}"
               onclick="onSelectProxy('${s.ticker}','${s.name}','${suggestionsId}','${inputId}')">
            <span class="${suggestionsId==='pcSuggestions'?'':'mso-name'}">${s.name}</span>
            <span class="${suggestionsId==='pcSuggestions'?'sug-ticker':'mso-ticker'}">${s.ticker}</span>
          </div>`
        ).join("");
      } catch {}
    }, 200);
  });
}

window.onSelectProxy = async function(ticker, name, sugId, inputId) {
  document.getElementById(sugId).style.display = "none";
  document.getElementById(inputId).value = "";
  if (sugId === "msoList") closeMobileSearch();
  if (!stocks.some(s => s.ticker === ticker)) {
    await serverAdd(ticker);
  }
  renderAll();
  selectStock(ticker);
};

// PC 검색 설정
setupSearch("pcSearchInput", "pcSuggestions");

// 모바일 검색
function openMobileSearch() {
  document.getElementById("mobileSearchOverlay").classList.add("visible");
  setTimeout(() => document.getElementById("mobileSearchInput").focus(), 100);
}
function closeMobileSearch() {
  document.getElementById("mobileSearchOverlay").classList.remove("visible");
  document.getElementById("mobileSearchInput").value = "";
  document.getElementById("msoList").innerHTML = "";
}
setupSearch("mobileSearchInput", "msoList");

/* ── 삭제 ── */
async function deleteStock(e, ticker) {
  e.stopPropagation();
  await serverDelete(ticker);
  if (selected === ticker) {
    selected = null;
    showEmpty();
  }
  renderAll();
}

function showEmpty() {
  document.getElementById("pcEmpty").style.display = "flex";
  document.getElementById("pcContent").style.display = "none";
  document.getElementById("mobileContent").innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                height:60vh;color:#8b95a1;">
      <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
      <div style="font-size:0.93rem">종목을 선택해주세요</div>
    </div>`;
}

/* ── 종목 선택 & 분석 ── */
async function selectStock(ticker) {
  selected = ticker;
  renderAll();
  if (ws) { ws.close(); ws = null; }

  document.getElementById("pcEmpty").style.display = "none";
  document.getElementById("pcContent").style.display = "block";
  document.getElementById("pcContent").innerHTML = `<div class="state-box">분석 중...</div>`;
  document.getElementById("mobileContent").innerHTML = `<div style="padding:48px;text-align:center;color:#8b95a1">분석 중...</div>`;

  try {
    const r = await fetch(`${API}/analyze/${ticker}`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderPC(data);
    renderMobile(data);
    connectWS(ticker);
  } catch(e) {
    const msg = `<div class="state-box">오류가 발생했어요<br><small style="color:#8b95a1">${e.message}</small></div>`;
    document.getElementById("pcContent").innerHTML = msg;
    document.getElementById("mobileContent").innerHTML = msg;
  }
}

/* ── 공통 데이터 ── */
function makeData(data) {
  const c = data.current;
  const ind = data.indicators;
  const fin = data.financials;
  const cr = c.change_rate;
  const cls = cr > 0 ? "up" : cr < 0 ? "down" : "flat";
  const sgn = cr > 0 ? "▲" : cr < 0 ? "▼" : "-";
  const vm = { buy: ["매수 추천","verdict-buy","🔴"], hold: ["보류","verdict-hold","🟡"], sell: ["매도","verdict-sell","🔵"] };
  const [vt, vc, ve] = vm[data.verdict] || ["?","",""];
  return { c, ind, fin, cr, cls, sgn, vt, vc, ve };
}

function bdg(val, gFn, bFn) {
  if (val == null) return `<span class="badge badge-neutral">-</span>`;
  if (gFn(val))   return `<span class="badge badge-buy">매수</span>`;
  if (bFn(val))   return `<span class="badge badge-sell">매도</span>`;
  return `<span class="badge badge-neutral">중립</span>`;
}
const fmt = v => v != null ? v : '-';
const pct = v => v != null ? v + '%' : '-';
function maLabel(ind) {
  if (!ind.ma5 || !ind.ma20) return '-';
  if (ind.ma60) {
    if (ind.ma5 > ind.ma20 && ind.ma20 > ind.ma60) return '정배열';
    if (ind.ma5 < ind.ma20 && ind.ma20 < ind.ma60) return '역배열';
    return '혼조';
  }
  return ind.ma5 > ind.ma20 ? '단기상승' : '단기하락';
}

/* ── 차트 ── */
let chartData = [];
let chartPeriod = "1d";
let livePrice = null;

async function loadChart(ticker, period) {
  chartPeriod = period;
  try {
    const r = await fetch(`${API}/chart/${ticker}?period=${period}`);
    chartData = await r.json();
    if (livePrice) {
      const last = chartData[chartData.length - 1];
      if (last) last.close = livePrice;
    }
    drawChart(ticker);
  } catch {}
}

function drawChart(ticker) {
  const canvas = document.getElementById("priceChart");
  if (!canvas || !chartData.length) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const PAD = { top: 20, bottom: 36, left: 48, right: 16 };
  const prices = chartData.map(d => d.close);
  const minP = Math.min(...prices), maxP = Math.max(...prices);
  const range = maxP - minP || 1;
  const isUp = prices[prices.length - 1] >= prices[0];
  const color = isUp ? "#f04452" : "#3182f6";

  const xOf = i => PAD.left + (i / (prices.length - 1)) * (W - PAD.left - PAD.right);
  const yOf = p => PAD.top + (1 - (p - minP) / range) * (H - PAD.top - PAD.bottom);

  ctx.clearRect(0, 0, W, H);

  // 그라데이션 fill
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(prices[0]));
  for (let i = 1; i < prices.length; i++) ctx.lineTo(xOf(i), yOf(prices[i]));
  ctx.lineTo(xOf(prices.length - 1), H - PAD.bottom);
  ctx.lineTo(xOf(0), H - PAD.bottom);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, PAD.top, 0, H - PAD.bottom);
  grad.addColorStop(0, isUp ? "rgba(240,68,82,0.15)" : "rgba(49,130,246,0.15)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.fill();

  // 라인
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(prices[0]));
  for (let i = 1; i < prices.length; i++) ctx.lineTo(xOf(i), yOf(prices[i]));
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  ctx.stroke();

  // 최고/최저 레이블
  const hiIdx = prices.indexOf(maxP), loIdx = prices.indexOf(minP);
  ctx.font = "11px -apple-system, sans-serif";
  ctx.fillStyle = "#8b95a1";
  ctx.textAlign = "right";
  ctx.fillText("최고 " + Number(maxP).toLocaleString(), xOf(hiIdx) - 6, yOf(maxP) + 4);
  ctx.fillText("최저 " + Number(minP).toLocaleString(), xOf(loIdx) - 6, yOf(minP) + 4);

  // 최고/최저 점
  [hiIdx, loIdx].forEach((idx, i) => {
    ctx.beginPath();
    ctx.arc(xOf(idx), yOf(prices[idx]), 3, 0, Math.PI * 2);
    ctx.fillStyle = "#8b95a1";
    ctx.fill();
  });

  // 현재 가격 점 (마지막)
  const lastX = xOf(prices.length - 1), lastY = yOf(prices[prices.length - 1]);
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

  return `

}

/* ── 실시간 WebSocket + 30초 폴링 ── */
let pricePoller = null;

function updatePriceUI(price, ticker) {
  livePrice = price;
  const v = Number(price).toLocaleString() + "원";
  const now = new Date().toLocaleTimeString("ko-KR", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  ["pcLivePrice","mobileLivePrice"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = v;
  });
  ["pcPriceTime","mobilePriceTime"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = now;
  });
  if (chartData.length) {
    chartData[chartData.length - 1].close = price;
    drawChart(ticker);
  }
}

function startPricePoller(ticker) {
  if (pricePoller) clearInterval(pricePoller);
  pricePoller = setInterval(async () => {
    try {
      const r = await fetch(`${API}/price/${ticker}`);
      const d = await r.json();
      if (d.price) updatePriceUI(d.price, ticker);
    } catch {}
  }, 5000);
}

function connectWS(ticker) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/${ticker}`);
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (!d.price) return;
    updatePriceUI(d.price, ticker);
  };
  ws.onerror = () => {};
  ws.onclose = () => {};
  startPricePoller(ticker);
}

/* ── 드래그 정렬 ── */
async function saveOrder() {
  const order = stocks.map(s => s.ticker);
  try {
    const r = await fetch(`${API}/watchlist/reorder`, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(order),
    });
    stocks = await r.json();
  } catch {}
}

function initSortable() {
  const pcList = document.getElementById("pcStockList");
  if (pcList && !pcList._sortable) {
    pcList._sortable = new Sortable(pcList, {
      animation: 150,
      handle: ".stock-list-item",
      onEnd(evt) {
        const moved = stocks.splice(evt.oldIndex, 1)[0];
        stocks.splice(evt.newIndex, 0, moved);
        saveOrder();
      },
    });
  }
  const mList = document.getElementById("mobileSidebarList");
  if (mList && !mList._sortable) {
    mList._sortable = new Sortable(mList, {
      animation: 150,
      onEnd(evt) {
        const moved = stocks.splice(evt.oldIndex, 1)[0];
        stocks.splice(evt.newIndex, 0, moved);
        saveOrder();
      },
    });
  }
}

/* ── 자동 업데이트 (30초마다 버전 체크) ── */
let _appVersion = null;
async function checkVersion() {
  try {
    const r = await fetch(`${API}/version`);
    const d = await r.json();
    if (!_appVersion) { _appVersion = d.version; return; }
    if (d.version !== _appVersion) location.reload();
  } catch {}
}
setInterval(checkVersion, 30000);

/* ── 기기 간 목록 동기화 (10초마다) ── */
async function syncWatchlist() {
  try {
    const r = await fetch(`${API}/watchlist`);
    const fresh = await r.json();
    const freshKeys = fresh.map(s => s.ticker).join(",");
    const currKeys = stocks.map(s => s.ticker).join(",");
    if (freshKeys !== currKeys) {
      stocks = fresh;
      renderAll();
    }
  } catch {}
}
setInterval(syncWatchlist, 10000);
